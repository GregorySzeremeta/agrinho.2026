<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loja Agro Paraná</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#2e7d32;
color:white;
padding:20px;
text-align:center;
}

.produtos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:30px;
}

.produto{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,.1);
text-align:center;
}

.produto img{
width:100%;
height:180px;
object-fit:cover;
border-radius:10px;
}

.produto h3{
margin:10px 0;
}

.produto p{
font-size:20px;
font-weight:bold;
color:#2e7d32;
}

button{
background:#2e7d32;
color:white;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#1b5e20;
}

.carrinho{
position:fixed;
top:20px;
right:20px;
background:white;
padding:15px;
width:300px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,.2);
}

.carrinho h2{
margin-bottom:10px;
}

#listaCarrinho{
margin-bottom:10px;
}

.total{
font-size:20px;
font-weight:bold;
color:#2e7d32;
}
</style>

</head>
<body>

<header>
<h1>🛒 Loja Agro Paraná</h1>
<p>Produtos frescos direto do campo</p>
</header>

<div class="carrinho">
<h2>Carrinho</h2>

<ul id="listaCarrinho"></ul>

<p class="total">
Total: R$ <span id="total">0.00</span>
</p>
</div>

<section class="produtos">

<div class="produto">
<img src="https://images.unsplash.com/photo-1574323347407-f5e1ad6d020b?w=600" alt="">
<h3>Milho</h3>
<p>R$ 12</p>
<button onclick="adicionar('Milho',12)">Adicionar</button>
</div>

<div class="produto">
<img src="https://images.unsplash.com/photo-1592928302636-c83cf1e1e0a4?w=600" alt="">
<h3>Soja</h3>
<p>R$ 18</p>
<button onclick="adicionar('Soja',18)">Adicionar</button>
</div>

<div class="produto">
<img src="https://images.unsplash.com/photo-1502741338009-cac2772e18bc?w=600" alt="">
<h3>Tomate</h3>
<p>R$ 9</p>
<button onclick="adicionar('Tomate',9)">Adicionar</button>
</div>

<div class="produto">
<img src="https://images.unsplash.com/photo-1518977676601-b53f82aba655?w=600" alt="">
<h3>Batata</h3>
<p>R$ 7</p>
<button onclick="adicionar('Batata',7)">Adicionar</button>
</div>

<div class="produto">
<img src="https://images.unsplash.com/photo-1447175008436-170170753d52?w=600" alt="">
<h3>Café</h3>
<p>R$ 25</p>
<button onclick="adicionar('Café',25)">Adicionar</button>
</div>

<div class="produto">
<img src="https://images.unsplash.com/photo-1560493676-04071c5f467b?w=600" alt="">
<h3>Feijão</h3>
<p>R$ 10</p>
<button onclick="adicionar('Feijão',10)">Adicionar</button>
</div>

<div class="produto">
<img src="https://images.unsplash.com/photo-1619566636858-adf3ef46400b?w=600" alt="">
<h3>Trigo</h3>
<p>R$ 15</p>
<button onclick="adicionar('Trigo',15)">Adicionar</button>
</div>

<div class="produto">
<img src="https://images.unsplash.com/photo-1603048297172-c92544798d5a?w=600" alt="">
<h3>Mel</h3>
<p>R$ 22</p>
<button onclick="adicionar('Mel',22)">Adicionar</button>
</div>

<div class="produto">
<img src="https://images.unsplash.com/photo-1587049352851-8d4e89133924?w=600" alt="">
<h3>Maçã</h3>
<p>R$ 11</p>
<button onclick="adicionar('Maçã',11)">Adicionar</button>
</div>

<div class="produto">
<img src="https://images.unsplash.com/photo-1574226516831-e1dff420e37f?w=600" alt="">
<h3>Leite</h3>
<p>R$ 8</p>
<button onclick="adicionar('Leite',8)">Adicionar</button>
</div>

</section>

<script>
let total = 0;

function adicionar(produto, preco){

const lista = document.getElementById("listaCarrinho");

const item = document.createElement("li");

item.innerHTML =
`${produto} - R$ ${preco.toFixed(2)}`;

lista.appendChild(item);

total += preco;

document.getElementById("total").innerText =
total.toFixed(2);
}
</script>

</body>
</html>
