<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agro Paraná - Dashboard Inteligente</title>

  <link rel="stylesheet" href="style.css">

  <!-- Charts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Leaflet (MAPA) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body>

<header class="hero">
  <div class="glass">
    <h1>🌾 Agro Inteligente no Paraná</h1>
    <p>Dados, tecnologia e inovação no campo brasileiro</p>

    <button onclick="toggleMode()">🌙 Modo Escuro</button>
  </div>
</header>

<nav>
  <a href="#mapa">Mapa</a>
  <a href="#dashboard">Dashboard</a>
  <a href="#culturas">Culturas</a>
  <a href="#galeria">Galeria</a>
</nav>

<!-- MAPA -->
<section id="mapa" class="section">
  <h2>🗺️ Mapa Interativo do Paraná</h2>
  <div id="map"></div>
</section>

<!-- DASHBOARD -->
<section id="dashboard" class="section">
  <h2>📊 Produção Agrícola</h2>

  <div class="charts">
    <canvas id="chart1"></canvas>
    <canvas id="chart2"></canvas>
  </div>
</section>

<!-- CULTURAS -->
<section id="culturas" class="section">
  <h2>🌾 Principais Culturas</h2>

  <div class="cards">
    <div class="card">🌱 Soja</div>
    <div class="card">🌽 Milho</div>
    <div class="card">🐔 Frango</div>
    <div class="card">🐷 Suínos</div>
  </div>
</section>

<!-- GALERIA -->
<section id="galeria" class="section">
  <h2>📸 Agro em Imagens</h2>

  <div class="gallery">
    <img src="https://images.unsplash.com/photo-1500595046743-cd271d694d30">
    <img src="https://images.unsplash.com/photo-1464226184884-fa280b87c399">
    <img src="https://images.unsplash.com/photo-1592982537447-6f2a2b2a4a2a">
    <img src="https://images.unsplash.com/photo-1500382017468-9049fed747ef">
  </div>
</section>

<footer>
  <p>Projeto Agro Paraná • estilo dashboard institucional</p>
</footer>

<script src="script.js"></script>
</body>
</html>
